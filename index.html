<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jack Billion — Landing</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--accent:#06b6d4;--muted:#9aa4b2}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial}
    body{background:linear-gradient(180deg,#071029 0%,var(--bg) 100%);color:#e6eef6;display:grid;place-items:center}
    .container{width:min(880px,92%);text-align:center;padding:48px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));box-shadow:0 8px 30px rgba(2,6,23,0.7)}
    h1{margin:0 0 8px;font-size:clamp(28px,4vw,44px);letter-spacing:-0.02em}
    p.lead{color:var(--muted);margin:0 0 24px;font-size:16px}
    .buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    a.btn{display:inline-block;padding:12px 18px;border-radius:10px;text-decoration:none;color:#04263a;background:var(--accent);font-weight:600}
    a.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
    footer{margin-top:20px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <main class="container" role="main">
    <h1>Welcome to Jack Billion</h1>
    <p class="lead">A simple, fast landing page. Ready for your projects, portfolio, or documentation.</p>
    <div class="buttons">
      <a class="btn" href="#get-started">Get started</a>
      <a class="btn ghost" href="#about">About</a>
    </div>
    <footer>
      <small>Built with ❤️ — jackbillion25.github.io</small>
    </footer>
  </main>
</body>
</html>
